input {
  tcp {
    port  => 5044
    codec => json_lines
  }
}

filter {
  if [level] {
    mutate {
      lowercase => ["level"]
    }
  }

  if [timestamp] {
    date {
      match   => ["timestamp", "ISO8601"]
      target  => "@timestamp"
      remove_field => ["timestamp"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "microservices-logs-%{+YYYY.MM.dd}"
  }
}
