global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ['api-gateway:9464']

  - job_name: user-service
    static_configs:
      - targets: ['user-service:9464']

  - job_name: notification-service
    static_configs:
      - targets: ['notification-service:9464']
