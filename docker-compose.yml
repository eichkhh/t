name: test

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health | grep -qE "\"status\":\"(green|yellow)\""']
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - '5601:5601'
    depends_on:
      elasticsearch:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    ports:
      - '3100:3000'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - '16686:16686'
      - '4318:4318'

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    volumes:
      - ./infra/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - '5044:5044'
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
      - XPACK_MONITORING_ENABLED=false
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9600/_node/stats || exit 1']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: users
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test -d users']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: test
      RABBITMQ_DEFAULT_PASS: test
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 10s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: users
      USER_SERVICE_HTTP_PORT: '3001'
      GRPC_PORT: '50051'
      RABBITMQ_URL: amqp://test:test@rabbitmq:5672
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: '5044'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      METRICS_PORT: '9464'
    ports:
      - '3001:3001'
      - '9465:9464'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      logstash:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '/usr/src/app/scripts/docker-healthcheck.js', '3001']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      RABBITMQ_URL: amqp://test:test@rabbitmq:5672
      NOTIFICATION_SERVICE_HTTP_PORT: '3002'
      PUSH_WEBHOOK_URL: https://webhook.site/2321676d-5ea8-4468-a88f-3a7098616880
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: '5044'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      METRICS_PORT: '9464'
    ports:
      - '3002:3002'
      - '9466:9464'
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      logstash:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '/usr/src/app/scripts/docker-healthcheck.js', '3002']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    environment:
      USER_SERVICE_GRPC_URL: user-service:50051
      API_GATEWAY_HTTP_PORT: '3000'
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: '5044'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      METRICS_PORT: '9464'
    ports:
      - '3000:3000'
      - '9464:9464'
    depends_on:
      user-service:
        condition: service_healthy
      logstash:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '/usr/src/app/scripts/docker-healthcheck.js', '3000']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

volumes:
  pgdata:
  esdata:
  grafana-data:
