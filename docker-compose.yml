name: test

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: users
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test -d users']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: test
      RABBITMQ_DEFAULT_PASS: test
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 10s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: users
      USER_SERVICE_HTTP_PORT: '3001'
      GRPC_PORT: '50051'
      RABBITMQ_URL: amqp://test:test@rabbitmq:5672
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '/usr/src/app/scripts/docker-healthcheck.js', '3001']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      RABBITMQ_URL: amqp://test:test@rabbitmq:5672
      NOTIFICATION_SERVICE_HTTP_PORT: '3002'
      PUSH_WEBHOOK_URL: https://webhook.site/2321676d-5ea8-4468-a88f-3a7098616880
    ports:
      - '3002:3002'
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '/usr/src/app/scripts/docker-healthcheck.js', '3002']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    environment:
      USER_SERVICE_GRPC_URL: user-service:50051
      API_GATEWAY_HTTP_PORT: '3000'
    ports:
      - '3000:3000'
    depends_on:
      user-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '/usr/src/app/scripts/docker-healthcheck.js', '3000']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

volumes:
  pgdata:
